<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Main TTO Announcer</title>

<style>
  body {
    background:#f5f7fb;
    font-family:-apple-system,system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:#0f172a;
    margin:0;
    text-align:center;
  }

  #call {
    display:none;
    width:min(960px,94vw);
    margin:40px auto;
    background:#000;
    color:#fff;
    border-radius:16px;
    padding:32px 18px;
    font-weight:800;
    font-size:clamp(26px,4.5vw,40px);
    line-height:1.6;
  }

  #call b {
    font-weight:900;
  }

  #englishCall {
    direction:ltr;
    margin-top:14px;
    font-size:clamp(20px,3.5vw,32px);
    color:#cbd5e1;
  }

  #soundGate {
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.82);
    color:#fff;
    z-index:10;
    font-size:22px;
    padding:20px;
  }

  #soundGate button {
    margin-top:14px;
    padding:12px 22px;
    border:0;
    border-radius:10px;
    background:#2563eb;
    color:#fff;
    font-weight:800;
    font-size:18px;
    cursor:pointer;
  }

  #status {
    margin-top:20px;
    color:#475569;
    font-weight:700;
    font-size:16px;
  }
</style>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>

<body>

<div id="soundGate">
  <div>
    اضغط تفعيل الصوت مرة واحدة للسماح بالنداء الصوتي.
    <br>

    <button id="enableBtn">
      تفعيل الصوت
    </button>
  </div>
</div>

<div id="call">

  <div id="arabicCall">
    تذكرة رقم
    (<b id="tNum"></b>)

    <span id="wWrap" style="display:none">
      ، الرجاء التوجه إلى شباك
      <b id="wNum"></b>
    </span>
  </div>

  <div id="englishCall">
    Ticket number
    <b id="tNumEn"></b>

    <span id="wWrapEn" style="display:none">
      , please proceed to counter
      <b id="wNumEn"></b>
    </span>
  </div>

</div>

<div id="status">
  Main TTO Announcer
</div>

<script>
(function(){

  /* ========== Firebase ========== */

  const cfg = {
    apiKey:"AIzaSyCWWnMsge75Q3_MDF9Aj9wo4C5KD6RVGfw",
    authDomain:"q-matic-b7d77.firebaseapp.com",
    databaseURL:"https://q-matic-b7d77-default-rtdb.firebaseio.com",
    projectId:"q-matic-b7d77",
    storageBucket:"q-matic-b7d77.appspot.com",
    messagingSenderId:"908187704899",
    appId:"1:908187704899:web:b8bcf33cda90bafe81bef6"
  };

  if (!firebase.apps.length) {
    firebase.initializeApp(cfg);
  }

  const db = firebase.database();

  /*
    هذا هو الربط الوحيد.
    لا يوجد أي اتصال مع cardiac_demo.
  */

  const ROOT = "main_TTO";


  /* ========== العناصر ========== */

  const callEl    = document.getElementById("call");

  const tNumEl    = document.getElementById("tNum");
  const wWrap     = document.getElementById("wWrap");
  const wNumEl    = document.getElementById("wNum");

  const tNumEnEl  = document.getElementById("tNumEn");
  const wWrapEn   = document.getElementById("wWrapEn");
  const wNumEnEl  = document.getElementById("wNumEn");

  const soundGate = document.getElementById("soundGate");
  const enableBtn = document.getElementById("enableBtn");
  const statusEl  = document.getElementById("status");


  /* ========== الأدوات ========== */

  function wait(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function toArabicDigits(value) {
    return String(value).replace(
      /\d/g,
      digit => "٠١٢٣٤٥٦٧٨٩"[digit]
    );
  }

  function normalizeValue(value) {
    if (value == null) {
      return null;
    }

    if (typeof value === "string") {
      const trimmed = value.trim();

      if (trimmed === "") {
        return null;
      }

      const parsed = Number(trimmed);

      return Number.isNaN(parsed)
        ? trimmed
        : parsed;
    }

    return value;
  }


  /* ========== تفعيل الصوت ========== */

  let ttsReady = false;

  enableBtn.onclick = () => {
    try {
      window.speechSynthesis.cancel();
      window.speechSynthesis.resume();
    } catch (e) {}

    ttsReady = true;

    soundGate.style.display = "none";

    statusEl.textContent = "الصوت مفعل — في انتظار النداء";

    /*
      تشغيل صوت قصير صامت تقريباً لتفعيل TTS في بعض الأجهزة.
    */

    try {
      const unlock = new SpeechSynthesisUtterance("Ready");
      unlock.volume = 0.01;
      unlock.lang = "en-US";
      window.speechSynthesis.speak(unlock);
    } catch (e) {}
  };


  /* ========== اختيار الصوت العربي ========== */

  function pickArabicVoice() {
    const voices = window.speechSynthesis.getVoices() || [];

    const preferredNames = voices.find(voice =>
      /naayf|naif|hoda|maged|tarik|arabic/i.test(voice.name)
    );

    if (preferredNames) {
      return preferredNames;
    }

    const saudiVoice = voices.find(voice =>
      /^ar[-_]SA$/i.test(voice.lang)
    );

    if (saudiVoice) {
      return saudiVoice;
    }

    const arabicVoice = voices.find(voice =>
      /^ar([-_]|$)/i.test(voice.lang)
    );

    return arabicVoice || null;
  }


  /* ========== اختيار الصوت الإنجليزي ========== */

  function pickEnglishVoice() {
    const voices = window.speechSynthesis.getVoices() || [];

    const preferredNames = voices.find(voice =>
      /samantha|daniel|zira|david|google uk english|google us english/i.test(
        voice.name
      )
    );

    if (preferredNames) {
      return preferredNames;
    }

    const britishVoice = voices.find(voice =>
      /^en[-_]GB$/i.test(voice.lang)
    );

    if (britishVoice) {
      return britishVoice;
    }

    const americanVoice = voices.find(voice =>
      /^en[-_]US$/i.test(voice.lang)
    );

    if (americanVoice) {
      return americanVoice;
    }

    const englishVoice = voices.find(voice =>
      /^en([-_]|$)/i.test(voice.lang)
    );

    return englishVoice || null;
  }


  window.speechSynthesis.onvoiceschanged = () => {
    pickArabicVoice();
    pickEnglishVoice();
  };


  /* ========== تشغيل جملة صوتية ========== */

  function speakText(text, language, voice, rate) {
    return new Promise(resolve => {

      if (
        !ttsReady ||
        !("speechSynthesis" in window)
      ) {
        resolve();
        return;
      }

      const cleanedText = String(text)
        .replace(/[ٌٍْـ]/g, "")
        .replace(/\s+/g, " ")
        .trim();

      const utterance =
        new SpeechSynthesisUtterance(cleanedText);

      utterance.lang = language;
      utterance.rate = rate;
      utterance.pitch = 1;
      utterance.volume = 1;

      if (voice) {
        utterance.voice = voice;
      }

      let finished = false;

      function finish() {
        if (finished) {
          return;
        }

        finished = true;
        resolve();
      }

      utterance.onend = finish;
      utterance.onerror = finish;

      window.speechSynthesis.speak(utterance);

      /*
        حماية في حال لم يرسل المتصفح حدث النهاية.
      */

      setTimeout(finish, 15000);
    });
  }


  function speakArabic(text) {
    return speakText(
      text,
      "ar-SA",
      pickArabicVoice(),
      1.05
    );
  }

  function speakEnglish(text) {
    return speakText(
      text,
      "en-US",
      pickEnglishVoice(),
      0.95
    );
  }


  /* ========== رقم الشباك بالعربي ========== */

  function fixArabicWindowNumber(number) {
    const words = {
      1:"واحِد",
      2:"اِثنان",
      3:"ثَلاثَة",
      4:"أَربَعَة",
      5:"خَمسَة",
      6:"سِتَّة",
      7:"سَبعَة",
      8:"ثَمانِيَة",
      9:"تِسعَة",
      10:"عَشَرَة",
      11:"أَحَدَ عَشَر",
      12:"اِثنا عَشَر",
      13:"ثَلاثَةَ عَشَر",
      14:"أَربَعَةَ عَشَر",
      15:"خَمسَةَ عَشَر",
      16:"سِتَّةَ عَشَر",
      17:"سَبعَةَ عَشَر",
      18:"ثَمانِيَةَ عَشَر",
      19:"تِسعَةَ عَشَر",
      20:"عِشرون"
    };

    return words[number] || toArabicDigits(number);
  }


  /* ========== بناء الجملة العربية ========== */

  function buildArabicPhrase(number, windowNumber) {
    const separator = "\u200C";

    const ticketNumber =
      toArabicDigits(number);

    if (
      windowNumber == null ||
      windowNumber === ""
    ) {
      return (
        `تَذْكِرَةُ${separator} ` +
        `رَقْم${separator} ` +
        `${ticketNumber}`
      );
    }

    const counterNumber =
      fixArabicWindowNumber(windowNumber);

    return (
      `تَذْكِرَةُ${separator} ` +
      `رَقْم${separator} ` +
      `${ticketNumber}. ` +
      `الرَّجاءُ${separator} ` +
      `التَّوَجُّهُ${separator} ` +
      `إلى${separator} ` +
      `الشُّبّاك${separator} ` +
      `رَقْم${separator} ` +
      `${counterNumber}`
    );
  }


  /* ========== بناء الجملة الإنجليزية ========== */

  function buildEnglishPhrase(number, windowNumber) {

    if (
      windowNumber == null ||
      windowNumber === ""
    ) {
      return `Ticket number ${number}`;
    }

    return (
      `Ticket number ${number}. ` +
      `Please proceed to counter number ${windowNumber}`
    );
  }


  /* ========== الطابور الصوتي ========== */

  const queue = [];
  const processed = new Set();

  let playing = false;

  /*
    لا يشغل النداءات القديمة عند فتح الصفحة.
    يستقبل فقط النداءات الجديدة خلال آخر خمس ثوانٍ.
  */

  const bootTimestamp = Date.now() - 5000;


  function enqueue(item) {
    queue.push(item);

    if (!playing) {
      playNext();
    }
  }


  async function playNext() {

    if (queue.length === 0) {
      playing = false;

      statusEl.textContent =
        ttsReady
          ? "الصوت مفعل — في انتظار النداء"
          : "الصوت غير مفعل";

      return;
    }

    playing = true;

    const item = queue.shift();

    const number = item.number;
    const windowNumber = item.windowNum;


    /* عرض الرقم على الشاشة */

    tNumEl.textContent =
      toArabicDigits(number);

    tNumEnEl.textContent =
      number;


    if (
      windowNumber != null &&
      windowNumber !== ""
    ) {
      wNumEl.textContent =
        toArabicDigits(windowNumber);

      wNumEnEl.textContent =
        windowNumber;

      wWrap.style.display = "inline";
      wWrapEn.style.display = "inline";

    } else {
      wWrap.style.display = "none";
      wWrapEn.style.display = "none";
    }


    callEl.style.display = "block";

    statusEl.textContent =
      `جاري نداء التذكرة ${number}`;


    /* تخزين النداء النشط داخل main_TTO فقط */

    try {
      await db.ref(`${ROOT}/activeCall`).set({
        number:number,
        window:windowNumber ?? null,
        ts:firebase.database.ServerValue.TIMESTAMP
      });
    } catch (e) {
      console.error("activeCall error:", e);
    }


    const arabicPhrase =
      buildArabicPhrase(number, windowNumber);

    const englishPhrase =
      buildEnglishPhrase(number, windowNumber);


    /*
      النداء العربي.
    */

    await speakArabic(arabicPhrase);

    await wait(500);


    /*
      النداء الإنجليزي.
    */

    await speakEnglish(englishPhrase);

    await wait(1200);


    playNext();
  }


  /* ========== جلب رقم الشباك ========== */

  async function resolveWindow(callValue, ticketNumber) {

    let candidate =
      callValue.window ??
      callValue.win ??
      callValue.windowNum ??
      callValue.counter ??
      null;

    candidate = normalizeValue(candidate);


    /*
      المصدر الثاني:
      main_TTO/assignment/رقم التذكرة/window
    */

    if (candidate == null) {
      try {
        const assignmentSnapshot =
          await db
            .ref(
              `${ROOT}/assignment/${ticketNumber}/window`
            )
            .get();

        if (assignmentSnapshot.exists()) {
          candidate =
            normalizeValue(
              assignmentSnapshot.val()
            );
        }
      } catch (e) {
        console.error("assignment error:", e);
      }
    }


    /*
      المصدر الثالث:
      main_TTO/operatorWindow
    */

    if (candidate == null) {
      try {
        const operatorWindowSnapshot =
          await db
            .ref(`${ROOT}/operatorWindow`)
            .get();

        if (operatorWindowSnapshot.exists()) {
          candidate =
            normalizeValue(
              operatorWindowSnapshot.val()
            );
        }
      } catch (e) {
        console.error("operatorWindow error:", e);
      }
    }


    return candidate;
  }


  /* ========== الاستماع إلى main_TTO/calls ========== */

  db.ref(`${ROOT}/calls`)
    .orderByChild("ts")
    .startAt(bootTimestamp)
    .on("child_added", async snapshot => {

      const key = snapshot.key;
      const value = snapshot.val() || {};

      if (processed.has(key)) {
        return;
      }

      processed.add(key);

      const ticketNumber =
        Number(value.number);

      if (
        !ticketNumber ||
        Number.isNaN(ticketNumber)
      ) {
        return;
      }

      const windowNumber =
        await resolveWindow(
          value,
          ticketNumber
        );

      enqueue({
        number:ticketNumber,
        windowNum:windowNumber
      });
    });


})();
</script>

</body>
</html>
